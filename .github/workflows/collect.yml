name: Collect AIS Data

on:
  schedule:
    - cron: '0 6,18 * * *'   # פעמיים ביום: 6 בבוקר ו-18 בערב UTC
  workflow_dispatch:           # אפשרות להפעיל ידנית

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data            # ענף ה-data ישירות
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install websocket-client

      - name: Run collector
        env:
          AIS_TOKEN: ${{ secrets.AIS_TOKEN }}
          COLLECTION_SECONDS: '300'
        run: python collector.py

      - name: Push DB to data branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add hormuz_ships.db
          git diff --staged --quiet || git commit -m "data: $(date -u '+%Y-%m-%d %H:%M')"
          git push
